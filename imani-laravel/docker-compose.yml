services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: imani
      POSTGRES_PASSWORD: imani
      POSTGRES_DB: imani_cms
    volumes:
      - imani_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U imani -d imani_cms"]
      interval: 3s
      timeout: 5s
      retries: 10

volumes:
  imani_pgdata:
